name: Update AI documentation

on:
  workflow_dispatch:

jobs:
  generate-ai-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate AI documentation
        run: npm run build:docs:ai

      - name: Check for changes
        id: git-check
        run: |
          git add docs/for-ai.md
          git diff --staged --quiet docs/for-ai.md || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit changes
        if: steps.git-check.outputs.changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BRANCH: 'update/for-ai-${{ github.run_id }}'
          TRUNK_BRANCH: 'trunk'
        run: |
          git switch -c "$PR_BRANCH"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Update docs/for-ai.md with the latest documentation and examples" docs/for-ai.md
          git push --set-upstream origin "$PR_BRANCH"
          gh pr create -B "$TRUNK_BRANCH" -H "$PR_BRANCH" --title "Update docs/for-ai.md" --body "Update docs/for-ai.md with the latest documentation and examples." --label "documentation"
